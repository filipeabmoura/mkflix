<div class="auth-wrap">
  <img src="/images/mkflix-logo.png" alt="MkFlix" class="auth-logo" />

  <section class="auth-card">
    <app-mk-page-title titulo="Entrar" subtitulo="Acesse sua conta MkFlix"></app-mk-page-title>

    <app-mk-alert tipo="info" [mensagem]="mensagemInfo"></app-mk-alert>
    <app-mk-alert tipo="erro" [mensagem]="mensagemErro"></app-mk-alert>

    <form [formGroup]="formulario" (ngSubmit)="enviar()" novalidate>
      <label class="campo">
        <span class="campo__label">E-mail</span>
        <input
          type="email"
          formControlName="email"
          autocomplete="email"
          class="campo__input"
        />
        <span
          class="campo__erro"
          *ngIf="formulario.controls.email.touched && formulario.controls.email.invalid"
          >Informe um e-mail válido.</span
        >
      </label>

      <label class="campo">
        <span class="campo__label">Senha</span>
        <input
          type="password"
          formControlName="senha"
          autocomplete="current-password"
          class="campo__input"
        />
        <span
          class="campo__erro"
          *ngIf="formulario.controls.senha.touched && formulario.controls.senha.invalid"
          >Mínimo de 6 caracteres.</span
        >
      </label>

      <app-mk-button
        tipoHtml="submit"
        label="Entrar"
        [loading]="carregando"
        [larguraTotal]="true"
      ></app-mk-button>
    </form>

    <p class="auth-card__rodape">
      Não tem conta?
      <a routerLink="/cadastro">Cadastre-se</a>
    </p>
  </section>
</div>
